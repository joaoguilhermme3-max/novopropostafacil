<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - PropostaFácil</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/style.css">

  <script>
    if (!localStorage.getItem('proposta_session')) {
      window.location.href = "login.html";
    }
  </script>
</head>

<body>

<header>
  <div>
    <h1>Proposta<span>Fácil</span></h1>
    <p class="lead">Visão geral do sistema</p>
  </div>

  <nav class="menu">
    <a href="index.html" class="menu-link">Propostas</a>
    <a href="#" class="menu-link">Relatórios</a>
    <a href="#" class="menu-link">Contato</a>
  </nav>

  <div class="controls">
    <button id="logout" class="btn btn-primary">Sair</button>
  </div>
</header>

<main style="padding:20px;">

  <!-- CARDS -->
  <section class="dashboard-cards" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:20px;">
    
    <div class="card">
      <h3>Total de Propostas</h3>
      <p id="totalCount" style="font-size:24px; margin-top:10px;">0</p>
    </div>

    <div class="card">
      <h3>Valor Total</h3>
      <p id="totalValue" style="font-size:24px; margin-top:10px;">R$ 0</p>
    </div>

    <div class="card">
      <h3>Este Mês</h3>
      <p id="monthCount" style="font-size:24px; margin-top:10px;">0</p>
    </div>

  </section>

  <!-- ÚLTIMAS PROPOSTAS -->
  <section class="card">
    <h2 style="margin-bottom:15px;">Últimas Propostas</h2>

    <table class="table">
      <thead>
        <tr>
          <th>Título</th>
          <th>Fornecedor</th>
          <th>Total</th>
          <th>Data</th>
        </tr>
      </thead>

      <tbody id="lastProposals"></tbody>
    </table>

  </section>

</main>

<script src="../js/dashboard.js"></script>

</body>
</html>
